app = "stadium-copilot"
primary_region = "sin"

[build]
dockerfile = "Dockerfile"

[env]
  DEMO_MODE = "1"
  SIM_SEED = "26"
  PORT = "8080"

[[services]]
  internal_port = 8080
  protocol = "tcp"
  auto_stop_machines = false
  min_machines_running = 1

  [[services.ports]]
    handlers = ["http"]
    port = 80
    force_https = true

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [services.concurrency]
    hard_limit = 25
    soft_limit = 20
    type = "connections"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
